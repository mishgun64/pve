---

#-----------------------Mount vda----------------------------------

- name: Attach LVM volume to VM 105
  ansible.builtin.command: >
    qm set 100 -virtio1 /dev/media_vg/media_lv
  delegate_to: pve

- name: Ensure /media directory exists
  ansible.builtin.file:
    path: /media
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Check if filesystem exists on /dev/vda
  ansible.builtin.command: blkid /dev/vda
  register: blkid_result
  failed_when: false
  changed_when: false

- name: Create ext4 filesystem on /dev/vda if missing
  ansible.builtin.filesystem:
    fstype: ext4
    dev: /dev/vda
  when: blkid_result.rc != 0

- name: Mount /dev/vda to /media
  ansible.posix.mount:
    path: /media
    src: /dev/vda
    fstype: ext4
    state: mounted
    opts: defaults

#-----------------------Create docker user----------------------------------

- name: Create docker user
  ansible.builtin.user:
    name: docker
    shell: /bin/bash
    create_home: yes

- name: Add docker user to docker group
  ansible.builtin.user:
    name: docker
    groups: docker
    append: true

#-----------------------Create folder structure----------------------------------

- name: Create media directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: docker
    group: docker
    mode: "0755"
  loop:
    - /media/torrents
    - /media/torrents/movies
    - /media/torrents/anime
    - /media/torrents/series
    - /media/library
    - /media/library/movies
    - /media/library/anime
    - /media/library/series

#-----------------------Install and run services ----------------------------------

- name: Create directories for docker services
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: docker
    group: docker
    mode: "0755"
  loop:
    - /home/docker/prowlarr_config
    - /home/docker/sonarr_anime_config
    - /home/docker/sonarr_series_config
    - /home/docker/radarr_config
    - /home/docker/bazarr_config
    - /home/docker/qbittorrent_config
    - /home/docker/seerr_config
    - /home/docker/jellyfin_config
    - /home/docker/emby_config

- name: Copy docker-compose file
  ansible.builtin.copy:
    src: docker-compose.yml
    dest: /home/docker/docker-compose.yml
    owner: docker
    group: docker
    mode: "0644"

- name: Stop docker compose stack
  ansible.builtin.shell: docker compose down
  args:
    chdir: /home/docker
  become: true
  become_user: docker

- name: Update docker compose stack
  ansible.builtin.shell: docker compose pull
  args:
    chdir: /home/docker
  become: true
  become_user: docker

- name: Start docker compose stack
  ansible.builtin.shell: docker compose up -d
  args:
    chdir: /home/docker
  become: true
  become_user: docker