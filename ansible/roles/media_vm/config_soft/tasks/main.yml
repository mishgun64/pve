---

#-----------------------Mount vda----------------------------------

- name: Attach LVM volume to VM 101
  ansible.builtin.command: >
    qm set 101 -virtio1 /dev/media_vg/media_lv
  delegate_to: pve

- name: Ensure /media directory exists
  ansible.builtin.file:
    path: /media
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Check if filesystem exists on /dev/vda
  ansible.builtin.command: blkid /dev/vda
  register: blkid_result
  failed_when: false
  changed_when: false

- name: Create ext4 filesystem on /dev/vda if missing
  ansible.builtin.filesystem:
    fstype: ext4
    dev: /dev/vda
  when: blkid_result.rc != 0

- name: Mount /dev/vda to /media
  ansible.posix.mount:
    path: /media
    src: /dev/vda
    fstype: ext4
    state: mounted
    opts: defaults

#-----------------------Create docker user----------------------------------

- name: Create docker group
  ansible.builtin.group:
    name: docker
    gid: 1000
    state: present

- name: Create docker user without shell
  ansible.builtin.user:
    name: docker
    uid: 1000
    group: docker
    create_home: yes
    shell: /usr/sbin/nologin
    system: no

#-----------------------Create folder structure----------------------------------

- name: Create media directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: docker
    group: docker
    mode: "0755"
  loop:
    - /media/torrents
    - /media/torrents/movies
    - /media/torrents/anime
    - /media/torrents/series
    - /media/library
    - /media/library/movies
    - /media/library/anime
    - /media/library/series

#-----------------------Install and run services ----------------------------------

- name: Create directories for docker services
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: docker
    group: docker
    mode: "0755"
  loop:
    - /home/docker/prowlarr_config
    - /home/docker/sonarr_anime_config
    - /home/docker/sonarr_series_config
    - /home/docker/radarr_config
    - /home/docker/bazarr_config
    - /home/docker/qbittorrent_config
    - /home/docker/seerr_config
    - /home/docker/jellyfin_config
    - /home/docker/emby_config

# 1. Список архивов и целевых директорий
- name: Define archives mapping
  set_fact:
    archives:
      emby: /home/docker/emby_config
      prowlarr: /home/docker/prowlarr_config
      radarr: /home/docker/radarr_config
      seerr: /home/docker/seerr_config
      sonarr_anime: /home/docker/sonarr_anime_config
      sonarr_series: /home/docker/sonarr_series_config

# 2. Расшифровка и распаковка
- name: Decrypt and extract archives
  shell: |
    set -e
    ENC_FILE="{{ init_dir }}/{{ item.key }}_init_config.tar.gz.enc"
    TAR_FILE="{{ init_dir }}/{{ item.key }}_init_config.tar.gz"
    TARGET_DIR="{{ item.value }}"

    mkdir -p "$TARGET_DIR"

    sops -d "$ENC_FILE" > "$TAR_FILE"
    tar -xzf "$TAR_FILE" -C "$TARGET_DIR"

    rm -f "$TAR_FILE"
  loop: "{{ archives | dict2items }}"

# 3. Копирование qbittorrent конфигов
- name: Ensure qbittorrent config dir exists
  file:
    path: /home/docker/qbittorrent_config/config
    state: directory
    mode: '0755'

- name: Copy qbittorrent configs
  copy:
    src: "{{ item }}"
    dest: /home/docker/qbittorrent_config/config/
    mode: '0644'
  loop:
    - "{{ init_dir }}/qbittorrent/categories.json"
    - "{{ init_dir }}/qbittorrent/qBittorrent.conf"

- name: Copy docker-compose file
  ansible.builtin.copy:
    src: docker-compose.yml
    dest: /home/docker/docker-compose.yml
    owner: docker
    group: docker
    mode: "0644"

- name: Stop docker compose stack
  ansible.builtin.shell: docker compose down
  args:
    chdir: /home/docker
  become: true
  become_user: docker

- name: Pull docker compose stack
  ansible.builtin.shell: docker compose pull
  args:
    chdir: /home/docker
  become: true
  become_user: docker

- name: Start docker compose stack
  ansible.builtin.shell: docker compose up -d
  args:
    chdir: /home/docker
  become: true
  become_user: docker