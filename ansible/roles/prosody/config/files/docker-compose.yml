Вот что изменилось и на что обратить внимание:

prosody.cfg.lua

Добавлена строка plugin_paths — Prosody будет искать community-модули в /usr/lib/prosody/community-modules (монтируется через volume).
mod_log_auth → модуль log_auth добавлен в modules_enabled. CrowdSec уже читает логи Prosody, так что паттерн брутфорса подхватится автоматически при наличии соответствующего парсера.
mod_invites требует трёх модулей: invites + invites_adhoc + invites_register. Также добавлена invites_url — базовый URL для генерации ссылок.
mod_muc_listing добавлен в Component "conference.mishgun.com", а не в глобальный modules_enabled.
mod_vcard_muc и mod_roster_all — в глобальный modules_enabled.
allow_registration = false остался — регистрация работает только по инвайту через mod_invites_register.
docker-compose.yml

Добавлен один volume:

yaml
- ./community-modules:/usr/lib/prosody/community-modules:ro
Как подготовить папку с модулями — выполни рядом с docker-compose.yml:

bash
# через Mercurial (официально)
hg clone https://hg.prosody.im/prosody-modules/ ./community-modules

# или через git-зеркало
git clone https://github.com/bjc/prosody-modules ./community-modules
В папке будут все модули, Prosody загрузит только нужные по именам из modules_enabled.

Важно: mod_smacks, mod_mam и mod_cloud_notify уже были в конфиге как встроенные. Community-версии из plugin_paths имеют приоритет и заменят встроенные — это желательное поведение, так как community-версии обычно новее.


