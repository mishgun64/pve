---

#-----------------------User settings----------------------------------

- name: Change root password
  ansible.builtin.user:
    name: root
    password: '$6$ES3euQTVkhNu9lVN$OB5LedrbKJVnNpReELcrDpkHsERSF1iIgy9ITLpl.9q5I4K6gvwKQjTs5HkLh/P4TRatj3Fgx770P4LCEGal4.'
    # python3 -c "import crypt; print(crypt.crypt('pass', crypt.mksalt(crypt.METHOD_SHA512)))"

- name: Set shell for docker user
  user:
    name: docker
    shell: /bin/bash

#--------------------------Firewall rules----------------------------------

- name: Copy rules to target
  ansible.builtin.copy:
    dest: /etc/pve/firewall/143.fw
    owner: root
    group: www-data
    mode: '0640'
    content: "{{ lookup('pipe', 'sops -d /var/lib/jenkins/jobs/pve/workspace/ansible/roles/traefik/config/files/143.fw.enc')}}"
  delegate_to: pve

- name: Convert to ASCII
  ansible.builtin.shell: >
    sed -i 's/\r//' /etc/pve/firewall/143.fw
  delegate_to: pve
#-----------------------Copy config files----------------------------------

- name: Copy traefik directory
  copy:
    src: traefik/
    dest: /home/docker/traefik/
    owner: docker
    group: docker
    mode: '0755'

- name: Create logs directory
  ansible.builtin.file:
    path: /home/docker/traefik/logs
    state: directory
    owner: docker
    group: docker
    mode: '0755'

- name: Create crowdsec data directory
  ansible.builtin.file:
    path: /home/docker/crowdsec/data
    state: directory
    owner: docker
    group: docker
    mode: '0755'

- name: Create crowdsec config directory
  ansible.builtin.file:
    path: /home/docker/crowdsec/config
    state: directory
    owner: docker
    group: docker
    mode: '0755'

- name: Copy acquis.yaml
  copy:
    src: crowdsec/acquis.yaml
    dest: /home/docker/crowdsec/acquis.yaml
    owner: docker
    group: docker
    mode: '0644'

- name: Create acme.json
  ansible.builtin.file:
    path: /home/docker/traefik/acme.json
    state: touch
    owner: docker
    group: docker
    mode: '0600'

- name: Copy docker-compose.yml
  copy:
    src: docker-compose.yml
    dest: /home/docker/docker-compose.yml
    owner: docker
    group: docker
    mode: '0644'

#-----------------------Autoupdate Crowdsec hub----------------------------------

- name: Update and upgrade CrowdSec hub daily
  ansible.builtin.cron:
    name: "Crowdsec hub update/upgrade"
    minute: "0"
    hour: "3"
    job: "docker exec crowdsec cscli hub update && docker exec crowdsec cscli hub upgrade"

#-----------------------Autobackup----------------------------------

- name: Initialize traefik and crowdsec backup
  ansible.builtin.cron:
    name: "Initialize traefik and crowdsec backup"
    hour: "4"
    minute: "0"
    job: "/usr/bin/curl -s -X POST 'http://192.168.1.200:8080/generic-webhook-trigger/invoke?token=pve-webhook' -H 'Content-Type: application/json' -d '{\"event\":\"media_vm_backup\",\"node\":\"pve1\",\"host\":\"pve1.local\"}'"
    user: root
    state: present