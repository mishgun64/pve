---

- name: Ensure backup dir exists on target
  file:
    path: /home/docker/backups
    state: directory
    mode: '0755'

- name: Find backups on control node
  find:
    paths: /srv/backups
    patterns: "*.zip"
  delegate_to: localhost
  register: backup_files

- name: Build latest backups dict
  set_fact:
    latest_backups: "{{ latest_backups | default({}) | combine({svc: item}) }}"
  vars:
    svc: "{{ item.path | basename | regex_replace('_.*$', '') }}"
  loop: "{{ backup_files.files | sort(attribute='mtime', reverse=True) }}"
  when: latest_backups is not defined or latest_backups[svc] is not defined

- name: Copy latest backups to target
  synchronize:
    src: "{{ item.value.path }}"
    dest: "/home/docker/backups/{{ item.value.path | basename }}"
  loop: "{{ latest_backups | dict2items }}"

- name: Stop docker compose
  command: docker compose down
  args:
    chdir: /home/docker

- name: Define service directories
  set_fact:
    service_dirs:
      prowlarr: /home/docker/prowlarr_config/
      radarr: /home/docker/radarr_config/
      sonarr_anime: /home/docker/sonarr_anime_config/
      sonarr_series: /home/docker/sonarr_series_config/
      bazarr: /home/docker/bazarr_config/
      emby: /home/docker/emby_config/
      jellyfin: /home/docker/jellyfin_config/
      seerr: /home/docker/seerr_config/

- name: Unarchive backups
  unarchive:
    src: "/home/docker/backups/{{ item.value.path | basename }}"
    dest: "{{ service_dirs[item.key] }}"
    owner: docker
    group: docker
    remote_src: yes
  loop: "{{ latest_backups | dict2items }}"
  when: item.key in service_dirs

- name: Start docker compose
  command: docker compose up -d
  args:
    chdir: /home/docker

- name: Remove backup dir
  file:
    path: /home/docker/backups
    state: absent