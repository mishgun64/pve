#--------------------------Stop stack----------------------------------

- name: Stop docker compose
  ansible.builtin.shell: docker compose down -v
  args:
    chdir: /home/docker

#--------------------------Find backup----------------------------------

- name: Find latest backup
  delegate_to: localhost
  run_once: true
  ansible.builtin.shell: |
    ls -1t /srv/backups/prosody/prosody_*.tar.gz.enc 2>/dev/null | head -n 1 || true
  register: latest_backup

- name: Set fact
  set_fact:
    backup_exists: "{{ latest_backup.stdout | length > 0 }}"

#--------------------------Decrypt----------------------------------

- name: Decrypt backup locally
  ansible.builtin.shell: |
    sops -d --input-type binary --output-type binary {{ latest_backup.stdout }} > /tmp/{{ (latest_backup.stdout | basename) | regex_replace('.enc$', '') }}
  delegate_to: localhost
  when: backup_exists

#--------------------------Extract----------------------------------

- name: Extract backup
  ansible.builtin.unarchive:
    src: "/tmp/{{ (latest_backup.stdout | basename) | regex_replace('.enc$', '') }}"
    dest: /home/docker/
    remote_src: false
  when: backup_exists

#--------------------------START DB FIRST----------------------------------

- name: Start MariaDB only
  ansible.builtin.shell: docker compose up -d mariadb
  args:
    chdir: /home/docker

- name: Wait for MariaDB to be healthy
  ansible.builtin.shell: |
    docker inspect --format='{{ "{{.State.Health.Status}}" }}' prosody-mariadb
  register: db_status
  until: db_status.stdout == "healthy"
  retries: 20
  delay: 3

#--------------------------Restore SQL----------------------------------

- name: Import MariaDB dump
  ansible.builtin.shell: |
    docker exec -i prosody-mariadb \
      sh -c 'mysql -u root -p"$MYSQL_ROOT_PASSWORD"' \
      < /home/docker/mariadb_{{ backup_time }}.sql

#--------------------------Start full stack----------------------------------

- name: Start full stack
  ansible.builtin.shell: docker compose up -d
  args:
    chdir: /home/docker

#-----------------------Add bouncer api key----------------------------------

- name: Delete existing bouncer (ignore errors)
  ansible.builtin.shell: docker exec crowdsec cscli bouncers delete prosody-firewall-bouncer
  ignore_errors: true

- name: Add bouncer
  ansible.builtin.shell: docker exec crowdsec cscli bouncers add prosody-firewall-bouncer
  register: bouncer_output

- name: Extract bouncer key
  ansible.builtin.set_fact:
    crowdsec_bouncer_key: "{{ bouncer_output.stdout_lines[2] | trim }}"

- name: Update api_key in crowdsec firewall bouncer config
  ansible.builtin.lineinfile:
    path: /etc/crowdsec/bouncers/crowdsec-firewall-bouncer.yaml
    regexp: '^api_key:'
    line: "api_key: {{ crowdsec_bouncer_key }}"

- name: Enroll CrowdSec console
  ansible.builtin.command: >
    docker exec crowdsec cscli console enroll
    {{ lookup('pipe', 'sops -d  /var/lib/jenkins/jobs/pve/workspace/ansible/roles/traefik/config/files/enroll_secret.enc') | trim }}
  no_log: true
  ignore_errors: true

- name: Restart containers
  ansible.builtin.shell: docker compose restart
  args:
    chdir: /home/docker
  become: true
  become_method: su
  become_user: docker