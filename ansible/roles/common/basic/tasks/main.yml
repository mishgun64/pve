---

#-----------------------Set timezone----------------------------------

- name: Set Europe/Moscow timezone
  ansible.builtin.shell: timedatectl set-timezone Europe/Moscow

#-----------------------Change sshd config----------------------------------

- name: Change sshd config
  ansible.builtin.copy:
    src: sshd_config
    dest: /etc/ssh/sshd_config

- name: Disable and stop ssh.socket
  systemd:
    name: ssh.socket
    enabled: false
    state: stopped

- name: Restart ssh
  systemd:
    name: ssh
    state: restarted
    enabled: true

- name: Wait for SSH to come back
  wait_for:
    port: 22
    delay: 2
    timeout: 30

#-----------------------Update and upgrade----------------------------------

- name: Update repo and upgrade packages
  ansible.builtin.apt:
    name: '*'
    state: latest
    update_cache: yes

