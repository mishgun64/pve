[general]
listen = "0.0.0.0:53"
protocol = "both"
domain = "auth.mishgun.com"
nsname = "auth.mishgun.com"
nsadmin = "admin.mishgun.com"
records = [
    "auth.mishgun.com. A 91.122.207.222",
    "auth.mishgun.com. NS auth.mishgun.com.",
]
debug = false

[database]
engine = "sqlite3"
connection = "/var/lib/acme-dns/acme-dns.db"

[api]
ip = "0.0.0.0"
port = "8080"
disable_registration = false
tls = "none"

[logconfig]
loglevel = "info"
logtype = "stdout"