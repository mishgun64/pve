[defaults]
interpreter_python =auto_silent
forks              = 10
timeout            = 30
host_key_checking  = False
callbacks_enabled  = timer, profile_tasks
#verbosity = 4
#pipelining = true
allow_world_readable_tmpfiles = true
[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -o StrictHostKeyChecking=no
control_path = /tmp/ansible-ssh-%%h-%%p-%%r
#pipelining = true