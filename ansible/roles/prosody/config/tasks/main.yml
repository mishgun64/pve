- name: Add CrowdSec GPG key
  ansible.builtin.get_url:
    url: https://packagecloud.io/crowdsec/crowdsec/gpgkey
    dest: /usr/share/keyrings/crowdsec.gpg
    mode: '0644'

- name: Add CrowdSec repository (force bookworm)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/crowdsec_crowdsec.list
    content: |
      deb [signed-by=/usr/share/keyrings/crowdsec.gpg] https://packagecloud.io/crowdsec/crowdsec/debian/ bookworm main

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes

- name: Install firewall bouncer (nftables)
  ansible.builtin.apt:
    name: crowdsec-firewall-bouncer-nftables
    state: present

