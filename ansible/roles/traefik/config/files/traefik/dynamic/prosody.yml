---

http:
  routers:
    prosody-upload:
      entryPoints:
        - websecure
      rule: "Host(`upload.mishgun.com`)"
      service: prosody-http
      tls: {}

  middlewares:
    prosody-headers:
      headers:
        customRequestHeaders:
          Host: "upload.mishgun.com"

  services:
    prosody-http:
      loadBalancer:
        servers:
          - url: "http://192.168.4.4:5280"
        passHostHeader: true

tcp:
  routers:
    prosody-c2s:
      entryPoints:
        - xmpp
      rule: "HostSNI(`*`)"
      service: prosody-c2s

  services:
    prosody-c2s:
      loadBalancer:
        servers:
          - address: "192.168.4.4:5222"