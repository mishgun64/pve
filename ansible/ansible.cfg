[defaults]
interpreter_python =auto_silent
forks              = 10
timeout            = 30
host_key_checking  = False
callbacks_enabled  = timer, profile_tasks
#verbosity = 4
#pipelining = true
#allow_world_readable_tmpfiles = true
[ssh_connection]
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
#pipelining = true