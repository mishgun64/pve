---

- name: Запланировать traefik-backup webhook на 01:00
  hosts: traefik_lxc
  remote_user: root
  gather_facts: false

  tasks:

    - name: "Добавить cron на 01:00"
      ansible.builtin.cron:
        name: "traefik-backup webhook"
        hour: "1"
        minute: "47"
        job: >-
          curl -X POST
          "http://192.168.2.200:8080/generic-webhook-trigger/invoke?token=pve-webhook"
          -H "Content-Type: application/json"
          -d '{"event":"traefik-backup","node":"pve1","host":"pve1.local"}'
          >> /var/log/traefik-backup-webhook.log 2>&1
        state: "{{ state | default('present') }}"