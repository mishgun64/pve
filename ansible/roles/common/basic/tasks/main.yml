#-----------------------Install packages----------------------------------

- name: Install apt packages
  ansible.builtin.apt:
    name:
      - neovim
      - cron
      - zip
    state: latest

- name: Install sops binary
  get_url:
    url: https://github.com/getsops/sops/releases/download/v3.12.2/sops-v3.12.2.linux.amd64
    dest: /usr/local/bin/sops
    mode: '0755'
    owner: root
    group: root

#-----------------------Copy .bashrc----------------------------------

- name: Copy .bashrc
  ansible.builtin.copy:
    src: .bashrc
    dest: /root/.bashrc

#-----------------------Scheduled update----------------------------------

- name: Scheduled update
  ansible.builtin.cron:
    name: 'Update and upgrade'
    minute: 0
    hour: 6
    job: apt update && apt upgrade -y

