http:
  routers:
    emby:
      rule: "Host(`emby.mishgun.com`)"
      entryPoints: websecure
      tls:
        certResolver: letsencrypt
      service: emby
      middlewares:
        - crowdsec@file

    upload:
      rule: "Host(`upload.mishgun.com`)"
      entryPoints: websecure
      tls:
        certResolver: letsencrypt
      service: upload-service
      middlewares:
        - crowdsec@file

  services:
    emby:
      loadBalancer:
        servers:
          - url: "http://192.168.2.4:8097"

    upload-service:
      loadBalancer:
        servers:
          - url: "http://192.168.4.4:5280"

tcp:
  routers:
    xmpp:
      entryPoints:
        - xmpp
      rule: "HostSNI(`*`)"
      service: xmpp-service
      tls:
        passthrough: true

  services:
    xmpp-service:
      loadBalancer:
        servers:
          - address: "192.168.4.4:5222"