---

#--------------------------Stop container----------------------------------

- name: Stop docker compose
  ansible.builtin.shell: docker compose down
  args:
    chdir: /home/docker

#--------------------------Find and copy latest acme backup----------------------------------

- name: Find latest backup
  ansible.builtin.find:
    paths: /srv/backups/
    patterns: "acme_*.json.enc"
    file_type: file
  register: backup_files
  delegate_to: localhost

- name: Select newest backup
  ansible.builtin.set_fact:
    latest_backup: "{{ (backup_files.files | sort(attribute='mtime'))[-1].path }}"
  when: backup_files.matched | int > 0
  delegate_to: localhost

- name: Decrypt latest backup (locally)
  ansible.builtin.command:
    cmd: sops -d --output-type json {{ latest_backup }}
  register: decrypted
  delegate_to: localhost
  changed_when: false
  when: backup_files.matched | int > 0

- name: Restore acme.json
  ansible.builtin.copy:
    dest: /home/docker/certs/acme.json
    content: "{{ decrypted.stdout }}"
    owner: docker
    group: docker
    mode: '0600'
  when: backup_files.matched | int > 0

#--------------------------Find and copy latest crowdsec backup----------------------------------

- name: Find latest CrowdSec backup (local)
  delegate_to: localhost
  run_once: true
  ansible.builtin.shell: |
    ls -1t /srv/backups/crowdsec_*.tar.gz.enc 2>/dev/null | head -n 1 || true
  register: latest_backup

- name: Set fact - backup exists
  set_fact:
    backup_exists: "{{ latest_backup.stdout | length > 0 }}"

- name: Skip restore if no backup found
  debug:
    msg: "No CrowdSec backups found on local host. Skipping restore."
  when: not backup_exists

- name: Decrypt CrowdSec backup locally
  ansible.builtin.shell: |
    sops -d {{ latest_backup.stdout }} > /tmp/{{ (latest_backup.stdout | basename) | regex_replace('.enc$', '') }}
  delegate_to: localhost
  when: backup_exists

- name: Set local decrypted path
  set_fact:
    local_tar: "/tmp/{{ (latest_backup.stdout | basename) | regex_replace('.enc$', '') }}"
  when: backup_exists

- name: Copy decrypted backup to remote host
  ansible.builtin.copy:
    src: "{{ local_tar }}"
    dest: "/home/docker/"
    owner: docker
    group: docker
    mode: '0644'
  when: backup_exists

- name: Set remote tar path
  set_fact:
    remote_tar: "/home/docker/{{ (latest_backup.stdout | basename) | regex_replace('.enc$', '') }}"
  when: backup_exists

- name: Extract CrowdSec backup
  ansible.builtin.unarchive:
    src: "{{ remote_tar }}"
    dest: /home/docker/
    owner: docker
    group: docker
    remote_src: true
  when: backup_exists

- name: Remove decrypted tar on remote
  ansible.builtin.file:
    path: "{{ remote_tar }}"
    state: absent
  when: backup_exists

- name: Remove decrypted tar locally
  ansible.builtin.file:
    path: "{{ local_tar }}"
    state: absent
  delegate_to: localhost
  when: backup_exists

#--------------------------Run container----------------------------------

- name: Pull docker compose
  ansible.builtin.shell: docker compose pull
  args:
    chdir: /home/docker
  become: true
  become_method: su
  become_user: docker
  timeout: 600

- name: Start docker compose
  ansible.builtin.shell: docker compose up -d
  args:
    chdir: /home/docker
  become: true
  become_method: su
  become_user: docker

#-----------------------Update Crowdsec API key----------------------------------

- name: Delete old bouncer
  ansible.builtin.command: docker exec crowdsec cscli bouncers delete crowdsecBouncer
  ignore_errors: true

- name: Create new bouncer
  ansible.builtin.command: docker exec crowdsec cscli bouncers add crowdsecBouncer
  register: bouncer_output

- name: Extract API key (by line index)
  ansible.builtin.set_fact:
    crowdsec_api_key: "{{ bouncer_output.stdout_lines[2] | trim }}"

- name: Write API key to file
  ansible.builtin.copy:
    content: "{{ crowdsec_api_key }}"
    dest: /home/docker/traefik/cs_secret
    owner: docker
    group: docker
    mode: '0400'

- name: Enroll CrowdSec console
  ansible.builtin.command: >
    docker exec crowdsec cscli console enroll
    {{ lookup('pipe', 'sops -d /var/lib/jenkins/jobs/pve/workspace/ansible/roles/traefik/config/files/enroll_secret.enc') | trim }}
  no_log: true
  ignore_errors: true

- name: Restart containers
  ansible.builtin.shell: docker compose restart
  args:
    chdir: /home/docker
  become: true
  become_method: su
  become_user: docker

#-----------------------ACME-DNS registration----------------------------------

- name: Check if acme-dns already registered
  ansible.builtin.stat:
    path: /home/docker/acme-dns/acme-dns.json
  register: acme_dns_json

- name: Register domain in acme-dns
  ansible.builtin.uri:
    url: "http://{{ ansible_host }}:8080/register"
    method: POST
    headers:
      Content-Type: "application/json"
    body: "{}"
    body_format: json
    return_content: yes
    status_code: 201
  register: acme_dns_register
  when: not acme_dns_json.stat.exists

- name: Save acme-dns registration to file
  ansible.builtin.copy:
    content: |
      {
        "mishgun.com": {{ acme_dns_register.json | to_nice_json }},
        "*.mishgun.com": {{ acme_dns_register.json | to_nice_json }}
      }
    dest: /home/docker/acme-dns/acme-dns.json
    owner: docker
    group: docker
    mode: '0600'
  when: not acme_dns_json.stat.exists

- name: Show registration result
  ansible.builtin.debug:
    msg: |
      Add CNAME at your DNS provider:
      _acme-challenge.mishgun.com  CNAME  {{ acme_dns_register.json.fulldomain }}
  when: not acme_dns_json.stat.exists