#-----------------------Set timezone----------------------------------

- name: Set Europe/Moscow timezone
  ansible.builtin.shell: timedatectl set-timezone Europe/Moscow

#-----------------------Change sshd config----------------------------------

- name: Change sshd config
  ansible.builtin.copy:
    src: sshd_config
    dest: /etc/ssh/sshd_config

- name: Disable ssh.socket
  ansible.builtin.systemd_service:
    name: ssh.socket
    enabled: false

- name: Enable ssh
  ansible.builtin.systemd_service:
    name: ssh
    enabled: true

#-----------------------Update and upgrade----------------------------------

- name: Update repo and upgrade packages
  ansible.builtin.apt:
    name: '*'
    state: latest
    update_cache: yes

