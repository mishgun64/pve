#-----------------------Auto updates----------------------------------

- name: Docker update via cron
  cron:
    name: "Docker update and cleanup"
    minute: "0"
    hour: "6"
    job: >
      cd /home/docker &&
      docker compose pull &&
      docker compose up -d &&
      docker system prune -af --volumes

- name: System update via cron
  cron:
    name: "APT update and cleanup"
    minute: "20"
    hour: "6"
    job: >
      apt update &&
      apt upgrade -y &&
      apt autoremove -y &&
      apt autoclean -y

- name: Update VueTorrent via cron
  cron:
    name: "vuetorrent update"
    minute: "30"
    hour: "6"
    job: >
      cd /home/docker/VueTorrent &&
      git pull