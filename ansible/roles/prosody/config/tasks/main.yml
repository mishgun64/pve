#-----------------------Copy config files----------------------------------

- name: Create required directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: docker
    group: docker
    mode: '0755'
  loop:
    - /home/docker/data
    - /home/docker/config
    - /home/docker/certs
    - /home/docker/mariadb-data
    - /home/docker/crowdsec/config
    - /home/docker/crowdsec/data
    - /home/docker/logs

- name: Copy prosody.cfg.lua
  copy:
    src: prosody.cfg.lua
    dest: /home/docker/config/prosody.cfg.lua
    owner: docker
    group: docker
    mode: '0644'

- name: Copy acquis.yaml
  copy:
    src: acquis.yaml
    dest: /home/docker/crowdsec/acquis.yaml
    owner: docker
    group: docker
    mode: '0644'

- name: Copy crowdsec-firewall-bouncer.yaml
  copy:
    src: crowdsec-firewall-bouncer.yaml
    dest: /etc/crowdsec/bouncers/crowdsec-firewall-bouncer.yaml

- name: Copy config.yaml
  copy:
    src: config.yaml
    dest: /home/docker/crowdsec/config/config.yaml

- name: Copy local_api_credentials.yaml
  copy:
    src: local_api_credentials.yaml
    dest: /home/docker/crowdsec/config/local_api_credentials.yaml

- name: Copy docker-compose.yml
  copy:
    src: docker-compose.yml
    dest: /home/docker/docker-compose.yml
    owner: docker
    group: docker
    mode: '0644'

- name: Decrypt and write .env file
  copy:
    content: "{{ lookup('pipe', 'sops -d --input-type dotenv --output-type dotenv /var/lib/jenkins/jobs/pve/workspace/ansible/roles/prosody/config/files/.env.enc') }}"
    dest: /home/docker/.env
    owner: docker
    group: docker
    mode: '0400'

#-----------------------Add mount point----------------------------------

- name: Add mount point to container 143
  ansible.builtin.command: >
    pct set 144 -mp0 /srv/certs/dumped-certs/,mp=/home/docker/certs
  delegate_to: pve

#-----------------------Autobackup----------------------------------

- name: Initialize prosody backup
  ansible.builtin.cron:
    name: "Initialize prosody backup"
    hour: "4"
    minute: "30"
    job: >-
      curl -X POST
      "http://192.168.2.200:8080/generic-webhook-trigger/invoke?token=pve-webhook"
      -H "Content-Type: application/json"
      -d '{"event":"prosody-backup","node":"pve1","host":"pve1.local"}'
      >> /var/log/traefik-backup-webhook.log 2>&1
    state: "{{ state | default('present') }}"