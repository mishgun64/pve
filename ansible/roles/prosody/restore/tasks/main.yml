#--------------------------Stop stack----------------------------------

- name: Stop docker compose
  ansible.builtin.shell: docker compose down -v
  args:
    chdir: /home/docker

#--------------------------Find backup----------------------------------

- name: Find latest backup
  delegate_to: localhost
  run_once: true
  ansible.builtin.shell: |
    ls -1t /srv/backups/prosody/prosody_*.tar.gz.enc 2>/dev/null | head -n 1 || true
  register: latest_backup

- name: Set fact
  set_fact:
    backup_exists: "{{ latest_backup.stdout | length > 0 }}"

#--------------------------Decrypt----------------------------------

- name: Decrypt backup locally
  ansible.builtin.shell: |
    sops -d --input-type binary --output-type binary {{ latest_backup.stdout }} > /tmp/{{ (latest_backup.stdout | basename) | regex_replace('.enc$', '') }}
  delegate_to: localhost
  when: backup_exists

#--------------------------Extract----------------------------------

- name: Extract backup
  ansible.builtin.unarchive:
    src: "/tmp/{{ (latest_backup.stdout | basename) | regex_replace('.enc$', '') }}"
    dest: /home/docker/
    remote_src: false
  when: backup_exists

#--------------------------START DB FIRST----------------------------------

- name: Start MariaDB only
  ansible.builtin.shell: docker compose up -d prosody-mariadb
  args:
    chdir: /home/docker

- name: Wait for MariaDB
  ansible.builtin.shell: |
    until docker exec prosody-mariadb mysqladmin ping --silent; do sleep 2; done

#--------------------------Restore SQL----------------------------------

- name: Import MariaDB dump
  ansible.builtin.shell: |
    docker exec -i prosody-mariadb mysql < /home/docker/mariadb_*.sql

#--------------------------Start full stack----------------------------------

- name: Start full stack
  ansible.builtin.shell: docker compose up -d
  args:
    chdir: /home/docker