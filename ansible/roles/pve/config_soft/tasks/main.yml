#-----------------------Download latest debian 13 lxc image----------------------------------

- name: Update pve lxc repo
  shell: >
    pveam update

- name: Download latest lxc image
  shell: >
    pveam download local $(pveam available | awk '/debian-13-standard/ {print $2}' | sort -V | tail -1)

