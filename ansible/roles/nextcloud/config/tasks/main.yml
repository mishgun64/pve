---

#--------------------------User settings----------------------------------

- name: Change root password
  ansible.builtin.user:
    name: root
    password: '$6$xMQrFaO1KeRvXQoD$HxbbsynFCtHgmZGgCdQC6m4oKTs4/9rrRQjE9cCF2MlL8hB6QD9rFPft0oNcVFXznpooF5XibRZYIp0iXOyMD1'
    # python3 -c "import crypt; print(crypt.crypt('pass', crypt.mksalt(crypt.METHOD_SHA512)))"

- name: Configure sysctl inside nextcloud VM
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    sysctl_set: true
    reload: true
  loop:
    - { name: "kernel.io_uring_disabled", value: "0" }
    - { name: "vm.overcommit_memory", value: "1" }

#--------------------------Firewall rules----------------------------------

- name: Decrypt locally
  ansible.builtin.set_fact:
    fw_content: "{{ lookup('pipe', 'sops -d /var/lib/jenkins/jobs/pve/workspace/ansible/roles/nextcloud/config/files/125.fw.enc') }}"
  delegate_to: localhost
  no_log: true

- name: Write to pmxcfs
  ansible.builtin.shell: cat > /etc/pve/firewall/125.fw
  args:
    stdin: "{{ fw_content | replace('\r\n', '\n') }}"
  become: true
  delegate_to: pve
  no_log: true


- name: Convert to ASCII
  ansible.builtin.shell: >
    sed -i 's/\r//' /etc/pve/firewall/125.fw
  delegate_to: pve

# -----------------------Mount md0----------------------------------

- name: Attach md0 RAID to VM 125
  ansible.builtin.command: >
    qm set 125 -virtio1 /dev/md0
  delegate_to: pve

- name: Ensure /mnt/data directory exists
  ansible.builtin.file:
    path: /mnt/data
    state: directory
    owner: 33
    group: 33
    mode: "0750"

- name: Check if filesystem exists on /dev/vda
  ansible.builtin.command: blkid /dev/vda
  register: blkid_result
  failed_when: false
  changed_when: false

- name: Create ext4 filesystem on /dev/vda if missing
  ansible.builtin.filesystem:
    fstype: ext4
    dev: /dev/vda
  when: blkid_result.rc != 0

- name: Mount /dev/vda to /mnt/data
  ansible.posix.mount:
    path: /mnt/data
    src: /dev/vda
    fstype: ext4
    state: mounted
    opts: defaults

#--------------------------Copy config files----------------------------------

- name: Create mariadb directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: 1001
    group: 1001
    mode: '0750'
  loop:
    - /home/docker/db

- name: Create nextcloud directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: 33
    group: 33
    mode: '0750'
  loop:
    - /home/docker/nextcloud

- name: Copy docker-compose.yml
  copy:
    src: docker-compose.yml
    dest: /home/docker/docker-compose.yml
    owner: docker
    group: docker
    mode: '0644'

- name: Copy .sops.yaml
  copy:
    src: .sops.yaml
    dest: /home/docker/.sops.yaml
    mode: '0644'

- name: Decrypt .env and write to VM
  ansible.builtin.copy:
    content: "{{ lookup('pipe', 'sops -d --input-type dotenv --output-type dotenv ' + role_path + '/files/.env.enc') }}"
    dest: /home/docker/.env
    owner: docker
    group: docker
    mode: "0600"

#-----------------------Run docker compose stack----------------------------------

- name: Pull docker compose stack
  ansible.builtin.shell: docker compose pull
  args:
    chdir: /home/docker
  become: true
  become_user: docker
  timeout: 600

- name: Run docker compose stack
  ansible.builtin.shell: docker compose up -d
  args:
    chdir: /home/docker
  become: true
  become_user: docker

#-----------------------Autobackup----------------------------------

- name: Add cron task for Nextcloud backup
  ansible.builtin.cron:
    name: "Initialize Nextcloud backup"
    hour: "5"
    minute: "10"
    job: >-
      curl -X POST
      "http://192.168.2.200:8080/generic-webhook-trigger/invoke?token=pve-webhook"
      -H "Content-Type: application/json"
      -d '{"event":"nexcloud-backup","node":"pve1","host":"pve1.local"}'
      >> /var/log/nextcloud-backup-webhook.log 2>&1
    state: "{{ state | default('present') }}"