# ============================================================
#  Настройки Nextcloud
# ============================================================
nextcloud_url: "https://cloud.mishgun.com"   # URL вашего Nextcloud
nextcloud_roms_path: "RetroArch/roms"                       # Папка внутри Nextcloud (Files/ROMs)

# ============================================================
#  Настройки монтирования WebDAV
# ============================================================
webdav_mount_point: "/mnt/nextcloud-roms"         # Куда монтировать на сервере

# ============================================================
#  Настройки RetroArch / Apple TV
# ============================================================
appletv_host: "192.168.1.37"                      # IP вашего Apple TV
appletv_port: "80"                                # Порт веб-сервера RetroArch

# ============================================================
#  Пути для скрипта retroarch-sync
# ============================================================
sync_install_dir: "/opt/retroarch-sync"           # Куда установить скрипт
sync_log_dir: "/var/log/retroarch-sync"           # Папка для логов
sync_user: "retroarch-sync"                       # Системный пользователь для сервиса

# Папки для двусторонней синхронизации (ROMs + saves)
twoway_sync_paths:
  - "ROMs"
  - "saves"

# Папки только для бэкапа с Apple TV на сервер
backup_only_paths:
  - "configs"

# Папки исключить полностью
exclude_paths:
  - "playlists"

# Интервал синхронизации в секундах
sync_loop_interval: "300"