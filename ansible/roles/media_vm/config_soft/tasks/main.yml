---

#-----------------------Mount vda----------------------------------

- name: Attach LVM volume to VM 101
  ansible.builtin.command: >
    qm set 101 -virtio1 /dev/media_vg/media_lv
  delegate_to: pve

- name: Ensure /media directory exists
  ansible.builtin.file:
    path: /media
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Check if filesystem exists on /dev/vda
  ansible.builtin.command: blkid /dev/vda
  register: blkid_result
  failed_when: false
  changed_when: false

- name: Create ext4 filesystem on /dev/vda if missing
  ansible.builtin.filesystem:
    fstype: ext4
    dev: /dev/vda
  when: blkid_result.rc != 0

- name: Mount /dev/vda to /media
  ansible.posix.mount:
    path: /media
    src: /dev/vda
    fstype: ext4
    state: mounted
    opts: defaults

#-----------------------Create folder structure----------------------------------

- name: Create media directory structure
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: docker
    group: docker
    mode: "0755"
  loop:
    - /media/torrents
    - /media/torrents/movies
    - /media/torrents/anime
    - /media/torrents/series
    - /media/library
    - /media/library/movies
    - /media/library/anime
    - /media/library/series

#-----------------------Copy init config----------------------------------

- name: Decrypt encrypted archives
  delegate_to: localhost
  run_once: true
  shell: >
    sops -d {{ item.src }} > {{ item.dest }}
  args:
    creates: "{{ item.dest }}"
  environment:
    SOPS_AGE_SSH_PRIVATE_KEY_FILE: /var/lib/jenkins/.ssh/id_ed25519
  loop:
    - { src: "{{ init_dir_jenkins }}/emby_init_config.tar.gz.enc", dest: "{{ init_dir_jenkins }}/emby_init_config.tar.gz" }
    - { src: "{{ init_dir_jenkins }}/prowlarr_init_config.tar.gz.enc", dest: "{{ init_dir_jenkins }}/prowlarr_init_config.tar.gz" }
    - { src: "{{ init_dir_jenkins }}/radarr_init_config.tar.gz.enc", dest: "{{ init_dir_jenkins }}/radarr_init_config.tar.gz" }
    - { src: "{{ init_dir_jenkins }}/seerr_init_config.tar.gz.enc", dest: "{{ init_dir_jenkins }}/seerr_init_config.tar.gz" }
    - { src: "{{ init_dir_jenkins }}/sonarr_anime_init_config.tar.gz.enc", dest: "{{ init_dir_jenkins }}/sonarr_anime_init_config.tar.gz" }
    - { src: "{{ init_dir_jenkins }}/sonarr_series_init_config.tar.gz.enc", dest: "{{ init_dir_jenkins }}/sonarr_series_init_config.tar.gz" }

- name: Create directories for docker services
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: docker
    group: docker
    mode: "0755"
  loop:
    - /home/docker/prowlarr_config
    - /home/docker/sonarr_anime_config
    - /home/docker/sonarr_series_config
    - /home/docker/radarr_config
    - /home/docker/bazarr_config
    - /home/docker/qbittorrent_config
    - /home/docker/seerr_config
    - /home/docker/jellyfin_config
    - /home/docker/emby_config

- name: Copy archives
  copy:
    src: "{{ item }}"
    dest: /home/docker/init_config/
  loop:
    - init_config/emby_init_config.tar.gz
    - init_config/prowlarr_init_config.tar.gz
    - init_config/radarr_init_config.tar.gz
    - init_config/seerr_init_config.tar.gz
    - init_config/sonarr_anime_init_config.tar.gz
    - init_config/sonarr_series_init_config.tar.gz

- name: Remove decrypted archives from control node
  delegate_to: localhost
  run_once: true
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ init_dir_jenkins }}/emby_init_config.tar.gz"
    - "{{ init_dir_jenkins }}/prowlarr_init_config.tar.gz"
    - "{{ init_dir_jenkins }}/radarr_init_config.tar.gz"
    - "{{ init_dir_jenkins }}/seerr_init_config.tar.gz"
    - "{{ init_dir_jenkins }}/sonarr_anime_init_config.tar.gz"
    - "{{ init_dir_jenkins }}/sonarr_series_init_config.tar.gz"

- name: Extract archives
  unarchive:
    src: "{{ item }}"
    dest: /home/docker/
    owner: docker
    group: docker
    mode: "0755"
    remote_src: yes
  loop:
    - /home/docker/init_config/emby_init_config.tar.gz
    - /home/docker/init_config/prowlarr_init_config.tar.gz
    - /home/docker/init_config/radarr_init_config.tar.gz
    - /home/docker/init_config/seerr_init_config.tar.gz
    - /home/docker/init_config/sonarr_anime_init_config.tar.gz
    - /home/docker/init_config/sonarr_series_init_config.tar.gz

- name: Ensure qbittorrent config dir exists
  file:
    path: /home/docker/qbittorrent_config/config
    state: directory
    owner: docker
    group: docker
    mode: '0755'

- name: Copy qbittorrent configs
  copy:
    src: "{{ item }}"
    dest: /home/docker/qbittorrent_config/config/
    owner: docker
    group: docker
    mode: '0644'
  loop:
    - init_config/qbittorrent/categories.json
    - init_config/qbittorrent/qBittorrent.conf

- name: Remove init_config directory
  file:
    path: /home/docker/init_config
    state: absent

