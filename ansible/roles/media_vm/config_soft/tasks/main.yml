#-----------------------Autobackup----------------------------------

- name: Initialize media services backup
  ansible.builtin.cron:
    name: "Initialize media services backup"
    hour: "4"
    minute: "0"
    job: >-
      curl -X POST
      "http://192.168.2.200:8080/generic-webhook-trigger/invoke?token=pve-webhook"
      -H "Content-Type: application/json"
      -d '{"event":"media_vm_backup","node":"pve1","host":"pve1.local"}'
      >> /var/log/media-vm-backup-webhook.log 2>&1
    state: "{{ state | default('present') }}"