---

#--------------------------Stop container----------------------------------

- name: Stop docker compose
  ansible.builtin.shell: docker compose down
  args:
    chdir: /home/docker

#--------------------------Find and copy latest acme backup----------------------------------

- name: Find latest backup
  ansible.builtin.find:
    paths: /srv/backups/
    patterns: "acme_*.json.enc"
    file_type: file
  register: backup_files
  delegate_to: localhost

- name: Select newest backup
  ansible.builtin.set_fact:
    latest_backup: "{{ (backup_files.files | sort(attribute='mtime'))[-1].path }}"
  when: backup_files.matched | int > 0
  delegate_to: localhost

- name: Decrypt latest backup (locally)
  ansible.builtin.command:
    cmd: sops -d --output-type json {{ latest_backup }}
  register: decrypted
  delegate_to: localhost
  changed_when: false
  when: backup_files.matched | int > 0

- name: Restore acme.json
  ansible.builtin.copy:
    dest: /home/docker/traefik/acme.json
    content: "{{ decrypted.stdout }}"
    owner: docker
    group: docker
    mode: '0600'
  when: backup_files.matched | int > 0

#--------------------------Find and copy latest crowdsec backup----------------------------------

- name: Find latest CrowdSec backup (local)
  delegate_to: localhost
  run_once: true
  ansible.builtin.shell: |
    ls -1t /srv/backups/crowdsec_*.tar.gz.enc 2>/dev/null | head -n 1 || true
  register: latest_backup

- name: Set fact - backup exists
  set_fact:
    backup_exists: "{{ latest_backup.stdout | length > 0 }}"

- name: Skip restore if no backup found
  debug:
    msg: "No CrowdSec backups found on local host. Skipping restore."
  when: not backup_exists

- name: Copy backup to remote host
  ansible.builtin.copy:
    src: "{{ latest_backup.stdout }}"
    dest: "/home/docker/"
    owner: docker
    group: docker
    mode: '0644'
  when: backup_exists

- name: Set remote file names
  set_fact:
    remote_enc: "/home/docker/{{ latest_backup.stdout | basename }}"
    remote_tar: "/home/docker/{{ (latest_backup.stdout | basename) | regex_replace('.enc$', '') }}"
  when: backup_exists

- name: Decrypt backup on remote host
  ansible.builtin.shell: >
    sops -d {{ remote_enc }} > {{ remote_tar }}
  when: backup_exists

- name: Extract CrowdSec backup
  ansible.builtin.unarchive:
    src: "{{ remote_tar }}"
    dest: /home/docker/
    owner: docker
    group: docker
    remote_src: true
  when: backup_exists

- name: Remove encrypted backup on remote
  ansible.builtin.file:
    path: "{{ remote_enc }}"
    state: absent
  when: backup_exists

- name: Remove decrypted tar on remote
  ansible.builtin.file:
    path: "{{ remote_tar }}"
    state: absent
  when: backup_exists

#--------------------------Run container----------------------------------

- name: Pull docker compose
  ansible.builtin.shell: docker compose pull
  args:
    chdir: /home/docker
  become: true
  become_method: su
  become_user: docker
  timeout: 600

- name: Start docker compose
  ansible.builtin.shell: docker compose up -d
  args:
    chdir: /home/docker
  become: true
  become_method: su
  become_user: docker

#-----------------------Update Crowdsec API key----------------------------------

- name: Delete old bouncer
  ansible.builtin.command: docker exec crowdsec cscli bouncers delete crowdsecBouncer
  ignore_errors: true

- name: Create new bouncer
  ansible.builtin.command: docker exec crowdsec cscli bouncers add crowdsecBouncer
  register: bouncer_output

- name: Extract API key (robust)
  ansible.builtin.set_fact:
    crowdsec_api_key: >-
      {{ bouncer_output.stdout_lines
      | select('match', '^[A-Za-z0-9+/=]+$')
      | list
      | first }}

- name: Write API key to file
  ansible.builtin.copy:
    content: "{{ crowdsec_api_key }}"
    dest: /home/docker/traefik/cs_secret
    owner: docker
    group: docker
    mode: '0400'

- name: Restart traefik
  ansible.builtin.shell: docker compose restart traefik
  args:
    chdir: /home/docker
  become: true
  become_method: su
  become_user: docker