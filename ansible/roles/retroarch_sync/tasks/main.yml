---
# ----------------------------------------------------------
#  1. Зависимости
# ----------------------------------------------------------
- name: Установить davfs2, git, curl, jq
  ansible.builtin.apt:
    name:
      - davfs2
      - git
      - curl
      - jq
    state: present
    update_cache: true

# ----------------------------------------------------------
#  2. Системный пользователь для сервиса
# ----------------------------------------------------------
- name: Создать системного пользователя {{ sync_user }}
  ansible.builtin.user:
    name: "{{ sync_user }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ sync_install_dir }}"
    create_home: false

# ----------------------------------------------------------
#  3. Директории
# ----------------------------------------------------------
- name: Создать директорию монтирования WebDAV
  ansible.builtin.file:
    path: "{{ webdav_mount_point }}"
    state: directory
    owner: "{{ sync_user }}"
    group: "{{ sync_user }}"
    mode: "0750"

- name: Создать директорию установки скрипта
  ansible.builtin.file:
    path: "{{ sync_install_dir }}"
    state: directory
    owner: "{{ sync_user }}"
    group: "{{ sync_user }}"
    mode: "0750"

- name: Создать директорию логов
  ansible.builtin.file:
    path: "{{ sync_log_dir }}"
    state: directory
    owner: "{{ sync_user }}"
    group: "{{ sync_user }}"
    mode: "0750"

# ----------------------------------------------------------
#  4. Учётные данные WebDAV (davfs2 secrets) — из SOPS+age
# ----------------------------------------------------------
- name: Загрузить секреты из зашифрованного SOPS файла
  ansible.builtin.set_fact:
    _secrets: "{{ lookup('pipe', 'sops -d --input-type yaml --output-type yaml ' ~ role_path ~ '/files/secrets.yml.enc') | from_yaml }}"
  no_log: true

- name: Убедиться что директория /etc/davfs2 существует
  ansible.builtin.file:
    path: /etc/davfs2
    state: directory
    mode: "0700"

- name: Записать credentials в /etc/davfs2/secrets
  ansible.builtin.lineinfile:
    path: /etc/davfs2/secrets
    create: true
    mode: "0600"
    regexp: "^{{ nextcloud_url }}/remote.php/dav/files/{{ _secrets.nextcloud_user }}/{{ nextcloud_roms_path }}"
    line: >-
      {{ nextcloud_url }}/remote.php/dav/files/{{ _secrets.nextcloud_user }}/{{ nextcloud_roms_path }}
      {{ _secrets.nextcloud_user }}
      {{ _secrets.nextcloud_password }}

# ----------------------------------------------------------
#  5. Монтирование WebDAV через /etc/fstab
# ----------------------------------------------------------
- name: Добавить запись в /etc/fstab для WebDAV
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: "^.*{{ webdav_mount_point }}.*"
    line: >-
      {{ nextcloud_url }}/remote.php/dav/files/{{ _secrets.nextcloud_user }}/{{ nextcloud_roms_path }}
      {{ webdav_mount_point }}
      davfs
      _netdev,uid={{ sync_user }},gid={{ sync_user }},rw,noauto,x-systemd.automount,x-systemd.requires=network-online.target
      0 0

- name: Примонтировать WebDAV (если ещё не смонтирован)
  ansible.builtin.command: mount "{{ webdav_mount_point }}"
  register: mount_result
  failed_when:
    - mount_result.rc != 0
    - "'already mounted' not in mount_result.stderr"
  changed_when: mount_result.rc == 0

# ----------------------------------------------------------
#  6. Скачать retroarch-sync.sh с GitHub
# ----------------------------------------------------------
- name: Скачать retroarch-sync.sh
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/blaz0r/AppleTV-RetroArch-Sync/main/retroarch-sync.sh"
    dest: "{{ sync_install_dir }}/retroarch-sync.sh"
    owner: "{{ sync_user }}"
    group: "{{ sync_user }}"
    mode: "0750"
    force: true

# ----------------------------------------------------------
#  7. Подставить переменные в скрипт
# ----------------------------------------------------------
- name: Настроить HOST
  ansible.builtin.lineinfile:
    path: "{{ sync_install_dir }}/retroarch-sync.sh"
    regexp: '^HOST='
    line: 'HOST="{{ appletv_host }}"'

- name: Настроить PORT
  ansible.builtin.lineinfile:
    path: "{{ sync_install_dir }}/retroarch-sync.sh"
    regexp: '^PORT='
    line: 'PORT="{{ appletv_port }}"'

- name: Настроить LOCAL_BASE_DIR
  ansible.builtin.lineinfile:
    path: "{{ sync_install_dir }}/retroarch-sync.sh"
    regexp: '^LOCAL_BASE_DIR='
    line: 'LOCAL_BASE_DIR="{{ webdav_mount_point }}"'

- name: Настроить SYNC_LOOP_INTERVAL
  ansible.builtin.lineinfile:
    path: "{{ sync_install_dir }}/retroarch-sync.sh"
    regexp: '^SYNC_LOOP_INTERVAL='
    line: 'SYNC_LOOP_INTERVAL="{{ sync_loop_interval }}"'

- name: Настроить TWOWAY_SYNC_PATHS
  ansible.builtin.replace:
    path: "{{ sync_install_dir }}/retroarch-sync.sh"
    regexp: '(?s)(TWOWAY_SYNC_PATHS=\().*?(\))'
    replace: |
      \1
      {% for p in twoway_sync_paths %}  "{{ p }}"
      {% endfor %}\2

- name: Настроить BACKUP_ONLY_PATHS
  ansible.builtin.replace:
    path: "{{ sync_install_dir }}/retroarch-sync.sh"
    regexp: '(?s)(BACKUP_ONLY_PATHS=\().*?(\))'
    replace: |
      \1
      {% for p in backup_only_paths %}  "{{ p }}"
      {% endfor %}\2

- name: Настроить EXCLUDE_PATHS
  ansible.builtin.replace:
    path: "{{ sync_install_dir }}/retroarch-sync.sh"
    regexp: '(?s)(EXCLUDE_PATHS=\().*?(\))'
    replace: |
      \1
      {% for p in exclude_paths %}  "{{ p }}"
      {% endfor %}\2

- name: Replace urlencode_path function in retroarch-sync.sh
  ansible.builtin.replace:
    path: "{{ sync_install_dir }}/retroarch-sync.sh"
    regexp: >-
      function urlencode_path\(\) \{[\s\S]*?^}
    replace: |
      function urlencode_path() {
        local input="$1"
        python3 -c "
      import urllib.parse, sys
      path = sys.argv[1]
      parts = path.split('/')
      encoded = '%2F'.join(urllib.parse.quote(p, safe='') for p in parts)
      print(encoded)
      " "$input"
      }

- name: Fix upload_file to escape local_path for curl
  ansible.builtin.shell: |
    python3 -c "
    with open('{{ script_path }}', 'r') as f:
        content = f.read()

    old = '      -F \"files[]=@\${local_path};filename=\${part_name}\"'
    new = '      -F \"files[]=@\${local_path//,/\\\\,};filename=\${part_name}\"'

    # Правильный фикс — через --form-string или экранирование пути
    old2 = '''    if curl -sS --fail \\
      --connect-timeout \"\$CURL_CONNECT_TIMEOUT\" \\
      --max-time \"\$CURL_MAX_TIME\" \\
      -X POST \\
      -F \"path=\${remote_dir}/\" \\
      -F \"files[]=@\${local_path};filename=\${part_name}\" \\
      \"\${UPLOAD_ENDPOINT}\"; then'''

    new2 = '''    local escaped_local_path
    escaped_local_path=\"\$(printf '%s' \"\${local_path}\" | sed 's/,/\\\\\\\\,/g; s/\\[/\\\\\\\\[/g; s/\\]/\\\\\\\\]/g')\"
    if curl -sS --fail \\
      --connect-timeout \"\$CURL_CONNECT_TIMEOUT\" \\
      --max-time \"\$CURL_MAX_TIME\" \\
      -X POST \\
      -F \"path=\${remote_dir}/\" \\
      -F \"files[]=@\${escaped_local_path};filename=\${part_name}\" \\
      \"\${UPLOAD_ENDPOINT}\"; then'''

    if old2 in content:
        content = content.replace(old2, new2)
        print('Patched upload_file')
    else:
        print('ERROR: pattern not found')

    with open('{{ script_path }}', 'w') as f:
        f.write(content)
    "
  args:
    executable: /bin/bash

# ----------------------------------------------------------
#  8. Systemd сервис
# ----------------------------------------------------------
- name: Создать systemd unit файл
  ansible.builtin.copy:
    dest: /etc/systemd/system/retroarch-sync.service
    mode: "0644"
    content: |
      [Unit]
      Description=RetroArch Sync — Apple TV <-> NAS via Nextcloud
      After=network-online.target
      Wants=network-online.target
      After={{ webdav_mount_point | replace('/', '-') | regex_replace('^-', '') }}.mount

      [Service]
      Type=simple
      User={{ sync_user }}
      Group={{ sync_user }}
      WorkingDirectory={{ sync_install_dir }}
      ExecStart=/bin/bash {{ sync_install_dir }}/retroarch-sync.sh
      Restart=on-failure
      RestartSec=60s
      StandardOutput=append:{{ sync_log_dir }}/retroarch-sync.log
      StandardError=append:{{ sync_log_dir }}/retroarch-sync.log

      [Install]
      WantedBy=multi-user.target

- name: Перезагрузить systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Включить и запустить сервис retroarch-sync
  ansible.builtin.systemd:
    name: retroarch-sync
    enabled: true
    state: started

# ----------------------------------------------------------
#  9. Ротация логов
# ----------------------------------------------------------
- name: Настроить logrotate для retroarch-sync
  ansible.builtin.copy:
    dest: /etc/logrotate.d/retroarch-sync
    mode: "0644"
    content: |
      {{ sync_log_dir }}/retroarch-sync.log {
          weekly
          rotate 4
          compress
          missingok
          notifempty
          copytruncate
      }

# ----------------------------------------------------------
#  10. Итоговый вывод
# ----------------------------------------------------------
- name: Статус сервиса
  ansible.builtin.command: systemctl status retroarch-sync --no-pager
  register: service_status
  changed_when: false
  failed_when: false

- name: Показать статус
  ansible.builtin.debug:
    msg: "{{ service_status.stdout_lines }}"