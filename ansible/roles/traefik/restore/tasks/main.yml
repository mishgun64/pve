---

#--------------------------Stop container--------------------------------------------------

- name: Stop docker compose
  ansible.builtin.shell: docker compose down
  args:
    chdir: /home/docker

#--------------------------Find and copy latest acme backup----------------------------------

- name: Find latest acme backup
  ansible.builtin.find:
    paths: /srv/backups/
    patterns: "acme_*.json.enc"
    file_type: file
  register: backup_files_acme
  delegate_to: localhost

- name: Select newest acme backup
  ansible.builtin.set_fact:
    latest_backup_acme: "{{ (backup_files_acme.files | sort(attribute='mtime'))[-1].path }}"
  when: backup_files_acme.matched | int > 0
  delegate_to: localhost

- name: Decrypt latest acme backup (locally)
  ansible.builtin.command:
    cmd: sops -d --output-type json {{ latest_backup_acme }}
  register: decrypted_acme
  delegate_to: localhost
  changed_when: false
  when: backup_files_acme.matched | int > 0

- name: Remove acme.json if it's a directory
  ansible.builtin.file:
    path: /home/docker/certs/traefik/acme.json
    state: absent
  when: backup_files_acme.matched | int > 0

- name: Restore acme.json
  ansible.builtin.copy:
    dest: /home/docker/certs/traefik/acme.json
    content: "{{ decrypted_acme.stdout }}"
    owner: docker
    group: docker
    mode: '0600'
  when: backup_files_acme.matched | int > 0

#--------------------------Find and copy latest ACME-DNS backup----------------------------------

- name: Find latest acme-dns backup
  delegate_to: localhost
  run_once: true
  ansible.builtin.shell: |
    ls -1t /srv/backups/acme-dns_*.tar.gz.enc 2>/dev/null | head -n 1 || true
  register: latest_backup_acme_dns

- name: Set fact - acme-dns backup exists
  set_fact:
    backup_exists_acme_dns: "{{ latest_backup_acme_dns.stdout | length > 0 }}"

- name: Skip restore if no acme-dns backup found
  debug:
    msg: "No acme-dns backups found on local host. Skipping restore."
  when: not backup_exists_acme_dns

- name: Decrypt acme-dns backup locally
  ansible.builtin.shell: |
    sops -d --input-type binary --output-type binary {{ latest_backup_acme_dns.stdout }} > /tmp/{{ (latest_backup_acme_dns.stdout | basename) | regex_replace('.enc$', '') }}
  delegate_to: localhost
  when: backup_exists_acme_dns

- name: Set local decrypted acme-dns path
  set_fact:
    local_tar_acme_dns: "/tmp/{{ (latest_backup_acme_dns.stdout | basename) | regex_replace('.enc$', '') }}"
  when: backup_exists_acme_dns

- name: Copy decrypted acme-dns backup to remote host
  ansible.builtin.copy:
    src: "{{ local_tar_acme_dns }}"
    dest: "/home/docker/"
    owner: docker
    group: docker
    mode: '0644'
  when: backup_exists_acme_dns

- name: Set remote acme-dns tar path
  set_fact:
    remote_tar_acme_dns: "/home/docker/{{ (latest_backup_acme_dns.stdout | basename) | regex_replace('.enc$', '') }}"
  when: backup_exists_acme_dns

- name: Extract acme-dns backup
  ansible.builtin.unarchive:
    src: "{{ remote_tar_acme_dns }}"
    dest: /home/docker/
    owner: docker
    group: docker
    remote_src: true
  when: backup_exists_acme_dns

- name: Remove decrypted acme-dns tar on remote
  ansible.builtin.file:
    path: "{{ remote_tar_acme_dns }}"
    state: absent
  when: backup_exists_acme_dns

- name: Remove decrypted acme-dns tar locally
  ansible.builtin.file:
    path: "{{ local_tar_acme_dns }}"
    state: absent
  delegate_to: localhost
  when: backup_exists_acme_dns

#--------------------------Find and copy latest crowdsec backup----------------------------------

- name: Find latest CrowdSec backup (local)
  delegate_to: localhost
  run_once: true
  ansible.builtin.shell: |
    ls -1t /srv/backups/crowdsec_*.tar.gz.enc 2>/dev/null | head -n 1 || true
  register: latest_backup_crowdsec

- name: Set fact - crowdsec backup exists
  set_fact:
    backup_exists_crowdsec: "{{ latest_backup_crowdsec.stdout | length > 0 }}"

- name: Skip restore if no crowdsec backup found
  debug:
    msg: "No CrowdSec backups found on local host. Skipping restore."
  when: not backup_exists_crowdsec

- name: Decrypt CrowdSec backup locally
  ansible.builtin.shell: |
    sops -d {{ latest_backup_crowdsec.stdout }} > /tmp/{{ (latest_backup_crowdsec.stdout | basename) | regex_replace('.enc$', '') }}
  delegate_to: localhost
  when: backup_exists_crowdsec

- name: Set local decrypted crowdsec path
  set_fact:
    local_tar_crowdsec: "/tmp/{{ (latest_backup_crowdsec.stdout | basename) | regex_replace('.enc$', '') }}"
  when: backup_exists_crowdsec

- name: Copy decrypted crowdsec backup to remote host
  ansible.builtin.copy:
    src: "{{ local_tar_crowdsec }}"
    dest: "/home/docker/"
    owner: docker
    group: docker
    mode: '0644'
  when: backup_exists_crowdsec

- name: Set remote crowdsec tar path
  set_fact:
    remote_tar_crowdsec: "/home/docker/{{ (latest_backup_crowdsec.stdout | basename) | regex_replace('.enc$', '') }}"
  when: backup_exists_crowdsec

- name: Extract CrowdSec backup
  ansible.builtin.unarchive:
    src: "{{ remote_tar_crowdsec }}"
    dest: /home/docker/
    owner: docker
    group: docker
    remote_src: true
  when: backup_exists_crowdsec

- name: Remove decrypted crowdsec tar on remote
  ansible.builtin.file:
    path: "{{ remote_tar_crowdsec }}"
    state: absent
  when: backup_exists_crowdsec

- name: Remove decrypted crowdsec tar locally
  ansible.builtin.file:
    path: "{{ local_tar_crowdsec }}"
    state: absent
  delegate_to: localhost
  when: backup_exists_crowdsec

#--------------------------Run container---------------------------------------

- name: Pull docker compose
  ansible.builtin.shell: docker compose pull
  args:
    chdir: /home/docker
  become: true
  become_method: su
  become_user: docker
  timeout: 600

- name: Start docker compose
  ansible.builtin.shell: docker compose up -d
  args:
    chdir: /home/docker
  become: true
  become_method: su
  become_user: docker

#-----------------------Update Crowdsec API key----------------------------------

- name: Delete old bouncer
  ansible.builtin.command: docker exec crowdsec cscli bouncers delete crowdsecBouncer
  ignore_errors: true

- name: Create new bouncer
  ansible.builtin.command: docker exec crowdsec cscli bouncers add crowdsecBouncer
  register: bouncer_output

- name: Extract API key (by line index)
  ansible.builtin.set_fact:
    crowdsec_api_key: "{{ bouncer_output.stdout_lines[2] | trim }}"

- name: Remove cs_secret if it's a directory
  ansible.builtin.file:
    path: /home/docker/traefik/cs_secret
    state: absent

- name: Write API key to file
  ansible.builtin.copy:
    content: "{{ crowdsec_api_key }}"
    dest: /home/docker/traefik/cs_secret
    owner: docker
    group: docker
    mode: '0400'

- name: Enroll CrowdSec console
  ansible.builtin.command: >
    docker exec crowdsec cscli console enroll
    {{ lookup('pipe', 'sops -d  /var/lib/jenkins/jobs/pve/workspace/ansible/roles/traefik/config/files/enroll_secret.enc') | trim }}
  no_log: true
  ignore_errors: true

- name: Recreate containers
  community.docker.docker_compose_v2:
    project_src: /home/docker/traefik
    state: present
    recreate: always

#-----------------------ACME-DNS registration----------------------------------

- name: Check if acme-dns already registered
  ansible.builtin.stat:
    path: /home/docker/acme-dns/acme-dns.json
  register: acme_dns_json

- name: Register domain in acme-dns
  ansible.builtin.shell: |
    curl -s -X POST \
      -H 'Content-Type: application/json' \
      -d '{}' \
      http://127.0.0.1:8080/register
  register: acme_dns_register
  when: not acme_dns_json.stat.exists

- name: Parse registration result
  ansible.builtin.set_fact:
    acme_dns_data: "{{ acme_dns_register.stdout | from_json }}"
  when: not acme_dns_json.stat.exists

- name: Save acme-dns registration to file
  ansible.builtin.copy:
    content: |
      {
        "mishgun.com": {{ acme_dns_data | to_nice_json }},
        "*.mishgun.com": {{ acme_dns_data | to_nice_json }}
      }
    dest: /home/docker/acme-dns/acme-dns.json
    owner: docker
    group: docker
    mode: '0600'
  when: not acme_dns_json.stat.exists

- name: Show registration result
  ansible.builtin.debug:
    msg: |
      Add CNAME at your DNS provider:
      _acme-challenge.mishgun.com  CNAME  {{ acme_dns_data.fulldomain }}
  when: not acme_dns_json.stat.exists